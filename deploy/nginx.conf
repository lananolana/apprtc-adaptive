# Nginx vhost для прототипа.
# Поместить в /etc/nginx/sites-available/apprtc-adaptive
# и сделать symlink: ln -s /etc/nginx/sites-available/apprtc-adaptive \
#                           /etc/nginx/sites-enabled/apprtc-adaptive
#
# ВАЖНО:
#  1. Подставь свой домен в server_name.
#  2. SSL-сертификат получи через certbot (см. deploy/setup.sh).
#     После certbot эти ssl_* блоки certbot допишет сам.
#  3. Блок WebSocket-апгрейда обязателен — без него /ws не работает.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name webrtcvkr.nomorepartiessite.ru;   # ← заменить на свой домен

    # certbot позже автоматически конвертирует это в 301-redirect на https
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }
}
